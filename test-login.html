<!DOCTYPE html>
<html>
<head>
    <title>登录测试 - GameTalent OS</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            background: #007bff;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }
        button:hover {
            background: #0056b3;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 4px;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
        }
        .success {
            background: #d4edda;
            color: #155724;
        }
        .info {
            background: #d1ecf1;
            color: #0c5460;
            margin-top: 20px;
            padding: 10px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <h1>🔐 登录测试</h1>

    <div class="info">
        <strong>测试账号：</strong><br>
        邮箱：admin@gametalent.os<br>
        密码：admin123
    </div>

    <form id="loginForm">
        <div class="form-group">
            <label>邮箱：</label>
            <input type="email" id="email" value="admin@gametalent.os" required>
        </div>
        <div class="form-group">
            <label>密码：</label>
            <input type="password" id="password" value="admin123" required>
        </div>
        <button type="submit">登录</button>
    </form>

    <div id="result" class="result" style="display:none;"></div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const resultDiv = document.getElementById('result');

            resultDiv.style.display = 'block';
            resultDiv.className = 'result';
            resultDiv.textContent = '登录中...';

            try {
                const response = await fetch('http://localhost:3006/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    resultDiv.className = 'result success';
                    resultDiv.textContent = `✅ 登录成功！\n\n` +
                        `用户信息：\n` +
                        `姓名：${data.user.name}\n` +
                        `邮箱：${data.user.email}\n` +
                        `角色：${data.user.role}\n\n` +
                        `JWT Token：\n${data.access_token.substring(0, 50)}...\n\n` +
                        `Token已保存到 localStorage，可以访问受保护的页面了！`;

                    // 保存token到localStorage
                    localStorage.setItem('auth_token', data.access_token);
                    localStorage.setItem('auth_user', JSON.stringify(data.user));
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.textContent = `❌ 登录失败：${data.message || '未知错误'}`;
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.textContent = `❌ 网络错误：${error.message}\n\n` +
                    `请确保后端服务运行在 http://localhost:3006`;
            }
        });
    </script>
</body>
</html>
